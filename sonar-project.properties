sonar.projectKey=sirosfoundation_siros-verifier-app
sonar.organization=sirosfoundation
sonar.projectVersion=0.1.0

sonar.sources=lib
sonar.tests=test
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/generated/**

# Coverage - SonarCloud native Dart support (LCOV)
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true
