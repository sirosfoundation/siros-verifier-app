name: SBOM

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sbom:
    uses: sirosfoundation/.github/.github/workflows/sbom.yml@main
    with:
      artifact-name: siros-verifier-app
      scan-vulnerabilities: true
      sign-sbom: false
    permissions:
      contents: write
      id-token: write
      security-events: write
